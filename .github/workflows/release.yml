name: Release

# Cut a release by pushing a version tag:
#   git tag v0.2.0 && git push origin v0.2.0
# This builds every platform, publishes a GitHub Release, and uploads
# checksums.txt. The asset names match what `awt update` and install.sh expect.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Build and archive
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -ldflags "-X main.version=${GITHUB_REF_NAME}" -o "awt${ext}" .
          name="awt-v${version}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${GITHUB_WORKSPACE}/${name}.zip" "awt${ext}"
          else
            tar czf "${GITHUB_WORKSPACE}/${name}.tar.gz" awt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: awt-v*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum awt-v* > checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            awt-v* checksums.txt
